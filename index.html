<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="App dedicata per aprire e consultare la Lavagna Avola." />
    <title>Lavagna Avola</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero" id="home">
        <div class="logo" aria-hidden="true">LA</div>
        <p class="eyebrow">Web app dedicata</p>
        <h1>Lavagna Avola</h1>
        <p class="subtitle">Apri e consulta rapidamente la lavagna da telefono, tablet o computer.</p>
        <button class="primary-button" id="openBoard" type="button">Apri Lavagna</button>
      </header>

      <main class="board-panel" id="boardPanel" hidden>
        <div class="panel-toolbar">
          <div>
            <p class="eyebrow">Consultazione</p>
            <h2>Lavagna Avola</h2>
          </div>
          <button class="secondary-button" id="backHome" type="button">Home</button>
        </div>

        <div class="notice" id="frameNotice" role="status" hidden>
          La lavagna non può essere visualizzata dentro l’app.
        </div>

        <div class="iframe-wrap" id="iframeWrap" aria-live="polite">
          <div class="loader" id="loader">Caricamento lavagna…</div>
        </div>
      </main>
    </div>

    <a class="browser-button" id="openBrowser" href="https://coopavola.eggsnext.cloud/main/functions/app/eggs-lavagna/lavagna" target="_blank" rel="noopener noreferrer">Apri in browser</a>

    <script src="app.js" defer></script>
  </body>
</html>
